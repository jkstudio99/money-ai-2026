name: Notify Telegram

on:
  push:
    branches: [main]
    paths:
      - 'routines/[0-9]*.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'Path to markdown file (e.g. routines/2026-05-27.md)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve target file
        id: resolve
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.file }}" ]; then
            file="${{ github.event.inputs.file }}"
          else
            file=$(git diff --name-only HEAD~1 HEAD \
              | grep -E '^routines/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$' \
              | tail -1 || true)
          fi
          if [ -z "$file" ] || [ ! -f "$file" ]; then
            echo "No routine file to notify about; skipping."
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Will notify for: $file"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Send Telegram
        if: steps.resolve.outputs.file != ''
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: ${{ steps.resolve.outputs.file }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: python3 .github/scripts/notify_telegram.py
